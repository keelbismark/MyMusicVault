<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">My Music Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/add-music.css">
    <link rel="stylesheet" href="lib/font-awesome/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-compact-disc"></i>
                </div>
                <span class="logo-text" data-i18n="app.title">My Music Vault</span>
            </div>

            <div class="nav-section">
                <div class="nav-item active" data-view="all">
                    <i class="fas fa-music"></i>
                    <span data-i18n="nav.all_tracks">Все треки</span>
                </div>
                <div class="nav-item" data-view="favorites">
                    <i class="fas fa-heart"></i>
                    <span data-i18n="nav.favorites">Избранное</span>
                </div>
                <div class="nav-item" data-view="playlists">
                    <i class="fas fa-play-circle"></i>
                    <span data-i18n="nav.playlists">Плейлисты</span>
                </div>
                <div class="nav-item" id="settings-btn">
                    <i class="fas fa-cog"></i>
                    <span data-i18n="nav.settings">Настройки</span>
                </div>
            </div>

            <div class="stats-card">
                <div class="stats-header">
                    <i class="fas fa-chart-bar"></i>
                    <span data-i18n="stats.total_tracks">Всего треков</span>
                </div>
                <div class="stats-content">
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="stats.total_tracks">Всего треков</span>
                        <span class="stat-value" id="total-songs">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label" data-i18n="stats.total_duration">Общее время</span>
                        <span class="stat-value" id="total-duration">0:00</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="top-actions">
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <label for="search-input"></label><input type="text" id="search-input" placeholder="" class="search-input">
                        <button class="search-btn">
                            <i class="fas fa-filter"></i>
                        </button>
                    </div>

                    <div class="action-buttons">
                        <button class="action-btn" id="add-music-btn">
                            <i class="fas fa-plus"></i>
                            <span data-i18n="buttons.add">Добавить</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="content-area">
                <div class="library-header">
                    <div class="library-info">
                        <h2 data-i18n="library.all_tracks">Все треки</h2>
                        <div class="sort-controls">
                            <button class="sort-toggle" id="sort-toggle">
                                <i class="fas fa-sort-alpha-down" id="sort-icon"></i>
                                <span id="sort-text">A-Z</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="song-list-container">
                    <div class="table-header">
                        <div class="table-row">
                            <div class="table-cell">#</div>
                            <div class="table-cell" data-i18n="table.title">Название</div>
                            <div class="table-cell" data-i18n="table.artist">Артист</div>
                            <div class="table-cell" data-i18n="table.album">Альбом</div>
                            <div class="table-cell" data-i18n="table.duration">Длительность</div>
                        </div>
                    </div>

                    <div class="table-body" id="song-list-body">
                    </div>
                </div>
            </div>
        </div>

        <div class="player-bar">
            <div class="now-playing">
                <div class="album-art">
                    <div class="art-placeholder">
                        <i class="fas fa-compact-disc"></i>
                    </div>
                </div>

                <div class="track-info">
                    <div class="track-title" id="now-playing-title" data-i18n="player.now_playing">Не выбрано</div>
                    <div class="track-artist" id="now-playing-artist" data-i18n="player.select_track">Выберите трек из библиотеки</div>
                </div>

                <div class="track-actions">
                    <button class="track-action-btn" id="like-btn">
                        <i class="far fa-heart"></i>
                    </button>
                </div>
            </div>

            <div class="player-controls">
                <div class="control-buttons">
                    <button class="control-btn secondary" id="shuffle-btn">
                        <i class="fas fa-random"></i>
                    </button>
                    <button class="control-btn" id="prev-btn">
                        <i class="fas fa-step-backward"></i>
                    </button>
                    <button class="control-btn primary play-btn" id="play-btn">
                        <i class="fas fa-play" id="play-icon"></i>
                    </button>
                    <button class="control-btn" id="next-btn">
                        <i class="fas fa-step-forward"></i>
                    </button>
                    <button class="control-btn secondary" id="repeat-btn">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>

                <div class="progress-container">
                    <span class="time-label" id="current-time">0:00</span>
                    <div class="progress-wrapper">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress"></div>
                        </div>
                        <label for="progress-slider"></label><input type="range" id="progress-slider" min="0" max="100" value="0" class="progress-slider">
                    </div>
                    <span class="time-label" id="duration">0:00</span>
                </div>
            </div>

            <div class="player-extras">
                <div class="volume-control">
                    <button class="volume-btn">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <div class="volume-slider-container">
                        <label for="volume-slider"></label><input type="range" id="volume-slider" min="0" max="100" value="70" class="volume-slider">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Music Modal -->
    <div class="modal-overlay" id="add-music-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="add_music.title">Добавить музыку</h2>
                <button class="modal-close" id="add-music-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="add-music-tabs">
                    <button class="tab-btn active" data-tab="youtube">
                        <i class="fab fa-youtube"></i>
                        <span data-i18n="add_music.youtube">YouTube Music</span>
                    </button>
                    <button class="tab-btn" data-tab="import">
                        <i class="fas fa-folder-open"></i>
                        <span data-i18n="add_music.import">Импорт из папки</span>
                    </button>
                </div>

                <div class="tab-content active" id="youtube-tab">
                    <div class="input-group">
                        <label for="youtube-url" data-i18n="add_music.youtube_url">Ссылка или поисковый запрос:</label>
                        <input type="text" id="youtube-url" placeholder="https://music.youtube.com/ или название трека">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="is-search">
                        <label for="is-search" data-i18n="add_music.search_mode">Режим поиска</label>
                    </div>
                    <div class="download-status" id="download-status"></div>
                    <div class="modal-actions">
                        <button class="modal-btn secondary" id="youtube-cancel">
                            <span data-i18n="buttons.cancel">Отмена</span>
                        </button>
                        <button class="modal-btn primary" id="youtube-download">
                            <i class="fas fa-download"></i>
                            <span data-i18n="buttons.download">Скачать</span>
                        </button>
                    </div>
                </div>

                <div class="tab-content" id="import-tab">
                    <div class="file-upload-area" id="file-upload-area">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p data-i18n="add_music.drop_files">Перетащите файлы сюда или</p>
                        <label for="file-input" class="file-input-label">
                            <span data-i18n="add_music.select_files">Выберите файлы</span>
                        </label>
                        <input type="file" id="file-input" multiple accept=".mp3,.flac,.wav,.ogg,.m4a">
                    </div>
                    <div class="selected-files" id="selected-files"></div>
                    <div class="modal-actions">
                        <button class="modal-btn secondary" id="import-cancel">
                            <span data-i18n="buttons.cancel">Отмена</span>
                        </button>
                        <button class="modal-btn primary" id="import-submit">
                            <i class="fas fa-upload"></i>
                            <span data-i18n="buttons.import">Импортировать</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 data-i18n="settings.title">Настройки</h2>
                <button class="modal-close" id="settings-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h3 data-i18n="settings.accent_color">Акцентный цвет</h3>
                    <div class="color-presets">
                        <div class="color-preset" data-color="#667eea" data-color-dark="#764ba2" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                        <div class="color-preset" data-color="#ff6b6b" data-color-dark="#ff4757" style="background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);"></div>
                        <div class="color-preset" data-color="#1dd1a1" data-color-dark="#10ac84" style="background: linear-gradient(135deg, #1dd1a1 0%, #10ac84 100%);"></div>
                        <div class="color-preset" data-color="#54a0ff" data-color-dark="#2e86de" style="background: linear-gradient(135deg, #54a0ff 0%, #2e86de 100%);"></div>
                        <div class="color-preset" data-color="#f368e0" data-color-dark="#ff9ff3" style="background: linear-gradient(135deg, #f368e0 0%, #ff9ff3 100%);"></div>
                    </div>
                    <div class="color-custom">
                        <label data-i18n="settings.custom_color">Свой цвет:</label>
                        <div class="color-input-group">
                            <label for="color-picker"></label><input type="color" id="color-picker" value="#667eea">
                            <label for="color-input"></label><input type="text" id="color-input" value="#667eea" maxlength="7">
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 data-i18n="settings.language">Язык</h3>
                    <div class="language-selector">
                        <button class="language-btn active" data-lang="ru">
                            <img src="https://flagcdn.com/w20/ru.png" alt="RU">
                            <span>Русский</span>
                        </button>
                        <button class="language-btn" data-lang="en">
                            <img src="https://flagcdn.com/w20/us.png" alt="EN">
                            <span>English</span>
                        </button>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 data-i18n="settings.volume">Громкость</h3>
                    <div class="volume-setting">
                        <label for="settings-volume-slider"></label><input type="range" id="settings-volume-slider" min="0" max="100" value="70" class="settings-volume-slider">
                        <span class="volume-value" id="settings-volume-value">70%</span>
                    </div>
                </div>

                <div class="settings-section">
                    <h3 data-i18n="settings.theme">Тема</h3>
                    <div class="theme-selector">
                        <button class="theme-btn active" data-theme="dark">
                            <i class="fas fa-moon"></i>
                            <span data-i18n="settings.theme.dark">Тёмная</span>
                        </button>
                        <button class="theme-btn" data-theme="light">
                            <i class="fas fa-sun"></i>
                            <span data-i18n="settings.theme.light">Светлая</span>
                        </button>
                    </div>
                </div>

                <div class="settings-actions">
                    <button class="settings-btn reset-btn" id="reset-settings" data-i18n="settings.reset">Сбросить настройки</button>
                    <div class="settings-buttons">
                        <button class="settings-btn secondary" id="settings-cancel" data-i18n="buttons.cancel">Отмена</button>
                        <button class="settings-btn primary" id="settings-save" data-i18n="buttons.save">Сохранить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player" controls style="display: none;"></audio>

    <script src="js/player.js"></script>
</body>
</html>
